<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Car Friend{% endblock %}</title>
  <style>
    body{font-family:system-ui,-apple-system,sans-serif;background:#0f1115;color:#e7e9ee;
         display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0}
    .card{background:#171a21;border:1px solid #262b36;border-radius:16px;
          padding:40px 48px;max-width:640px;width:90%}
    h1{margin:0 0 12px;font-size:1.6rem}
    p{color:#aab2c0;line-height:1.55}
    a{color:#6ea8fe;text-decoration:none}
    .applink{display:block;padding:11px 14px;border:1px solid #262b36;border-radius:10px;margin:8px 0}
    .applink:hover{background:#1f2430}
    .tag{font-size:.72rem;color:#7a8395;float:right}
    .back{display:inline-block;margin-top:18px;font-size:.85rem}
  </style>
</head>
<body><div class="card">{% block content %}{% endblock %}</div></body>
</html>
