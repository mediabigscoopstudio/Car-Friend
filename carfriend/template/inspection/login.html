{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Car Friend Inspector · Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/inspector.css' %}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .login-card { width: 100%; max-width: 360px; padding: 32px 26px; }
    .login-logo { width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 14px; display: grid; place-items: center;
      background: var(--sage-bg); box-shadow: inset 0 0 0 2px var(--sage-deep); color: var(--sage-deep); }
    .login-logo svg { width: 30px; height: 30px; }
    .login-card h1 { font-family: var(--font-d); font-weight: 800; font-size: 22px; text-align: center; margin: 0; }
    .login-sub { text-align: center; font-size: 12px; color: var(--muted); margin: 4px 0 24px;
      text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }
    .login-card label { display: block; font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .login-card input { width: 100%; height: 46px; border: 1px solid var(--line); border-radius: var(--r-btn);
      background: var(--surface); padding: 0 14px; font-family: var(--font-b); font-size: 15px; color: var(--ink); margin-bottom: 16px; }
    .login-card input:focus { outline: none; border-color: var(--sage-deep); }
    .login-err { background: var(--alert-bg); border: 1px solid var(--alert-text); color: var(--alert-text);
      border-radius: 11px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="login-logo">
      <img src="{% static 'img/brand/logo-green.png' %}" alt="CarFriend" style="width:34px;height:auto;display:block;">
    </div>
    <h1>Car Friend</h1>
    <div class="login-sub">Inspector Portal</div>
    {% if error %}<div class="login-err">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <label>Username</label>
      <input type="text" name="username" required autofocus autocomplete="username"/>
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password"/>
      <button type="submit" class="btn btn-primary block">Sign in</button>
    </form>
  </div>
</body>
</html>
