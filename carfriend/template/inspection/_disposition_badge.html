{# Reusable disposition tag. Usage: {% include "inspection/_disposition_badge.html" with disposition=vehicle.disposition %} #}
{% if disposition == 'auction' %}<span style="display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(22,101,52,.12);color:#166534;letter-spacing:.04em;vertical-align:middle">AUCTION</span>{% elif disposition == 'scrap' %}<span style="display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(239,68,68,.12);color:#dc2626;letter-spacing:.04em;vertical-align:middle">SCRAP</span>{% endif %}
