<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CarFriend — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1115;
      color: #e7e9ee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      text-align: center;
      padding: 48px 32px;
      max-width: 520px;
      width: 90%;
    }

    .logo {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
      color: #fff;
    }

    .logo span {
      color: #4f8ef7;
    }

    .badge {
      display: inline-block;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #4f8ef7;
      background: rgba(79,142,247,.12);
      border: 1px solid rgba(79,142,247,.25);
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 36px;
    }

    .headline {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 16px;
      color: #fff;
    }

    .sub {
      font-size: 1rem;
      color: #8b94a6;
      line-height: 1.65;
      margin-bottom: 48px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #4f8ef7, #7b61ff);
      border-radius: 2px;
      margin: 0 auto 48px;
    }

    .host-label {
      font-size: .8rem;
      color: #4a5260;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-top: 48px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Car<span>Friend</span></div>
    {% if host_label %}<div class="badge">{{ host_label }}</div>{% endif %}
    <h1 class="headline">Coming Soon</h1>
    <div class="divider"></div>
    <p class="sub">We're working hard to bring you something great.<br>Check back soon.</p>
    {% if host_label %}<p class="host-label">{{ host_label }}</p>{% endif %}
  </div>
</body>
</html>
