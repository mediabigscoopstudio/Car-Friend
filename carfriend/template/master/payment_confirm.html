{% extends "base/base_web.html" %}
{% block title %}Confirm Payment · Master{% endblock %}
{% block page_title %}Confirm Payment{% endblock %}

{% block content %}
<div style="margin-bottom:20px"><a href="/payments_pending" style="color:var(--brand);font-size:14px;text-decoration:none">← Back</a></div>
<div class="kpi-grid">
  <div class="kpi-card"><div class="label">Deal</div><div class="value" style="font-size:16px">{{ p.deal }}</div></div>
  <div class="kpi-card"><div class="label">Amount</div><div class="value green">₹{{ p.amount|floatformat:0 }}</div></div>
</div>
<div class="form-card" style="margin-top:24px">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group"><label>Upload Proof (screenshot/scan)</label><input type="file" name="proof_image" accept="image/*"/></div>
    <div class="form-group"><label>Note</label><textarea name="note" rows="3" style="resize:vertical"></textarea></div>
    <button type="submit" class="btn btn-primary">Confirm Payment</button>
  </form>
</div>
{% endblock %}
