<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>{% block title %}Car Friend Inspector{% endblock %}</title>
  <style>
    :root {
      --brand:    #10B26A;
      --brand-dk: #0d9558;
      --bg:       #0D0F13;
      --surface:  #161A21;
      --surface2: #1E2430;
      --border:   #2A3142;
      --text:     #E8ECF4;
      --text-2:   #8A94A8;
      --danger:   #EF4444;
      --warn:     #F59E0B;
      --font:     'Sora', 'Hanken Grotesk', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; }

    /* Status bar (cosmetic) */
    .statusbar { height: 44px; background: var(--bg); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 12px; font-weight: 600; flex-shrink: 0; }

    /* Screen content */
    .screen { flex: 1; overflow-y: auto; padding: 0 0 80px; }

    /* App header */
    .app-header { padding: 16px 20px 12px; display: flex; align-items: center; gap: 12px; }
    .app-header .back { color: var(--brand); font-size: 22px; text-decoration: none; }
    .app-header h1 { font-size: 18px; font-weight: 700; flex: 1; }
    .app-header .logo { font-weight: 700; color: var(--brand); font-size: 16px; }

    /* Bottom tab bar */
    .tabbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
    .tabbar a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px 14px; gap: 4px; font-size: 10px; color: var(--text-2); text-decoration: none; }
    .tabbar a.active, .tabbar a:hover { color: var(--brand); }
    .tabbar a svg { width: 22px; height: 22px; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin: 8px 16px; overflow: hidden; }
    .card-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-header h2 { font-size: 15px; font-weight: 700; }
    .card-body { padding: 16px; }

    /* Progress bar */
    .progress-wrap { margin: 12px 16px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-2); margin-bottom: 6px; }
    .progress-bar { height: 6px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--brand); border-radius: 999px; transition: width .3s; }

    /* Section nav chips */
    .section-chips { display: flex; gap: 8px; overflow-x: auto; padding: 8px 16px; scrollbar-width: none; }
    .section-chips a { flex-shrink: 0; padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; background: var(--surface2); color: var(--text-2); text-decoration: none; border: 1px solid var(--border); }
    .section-chips a.active { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* Checkpoint row */
    .cp-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .cp-row label { flex: 1; font-size: 14px; }
    .cp-row select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 10px; font-size: 13px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; width: 100%; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-block { margin: 16px 16px 0; }

    /* Forms */
    .field { margin: 0 16px 12px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
    .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px 14px; font-size: 14px; font-family: var(--font); }
    .field input:focus, .field select:focus { outline: none; border-color: var(--brand); }

    /* Visit item */
    .visit-item { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
    .visit-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .visit-dot.green { background: var(--brand); }
    .visit-dot.yellow { background: var(--warn); }
    .visit-dot.gray { background: var(--text-2); }
    .visit-info { flex: 1; }
    .visit-info .name { font-weight: 600; font-size: 14px; }
    .visit-info .sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .visit-item .time { font-size: 12px; color: var(--text-2); font-family: monospace; }

    /* Alert/notification row */
    .notif-item { padding: 14px 16px; border-top: 1px solid var(--border); }
    .notif-item .notif-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .notif-item .notif-body { font-size: 12px; color: var(--text-2); }
    .notif-item .notif-time { font-size: 11px; color: var(--text-2); margin-top: 4px; }
    .notif-item.unread { border-left: 3px solid var(--brand); }

    /* Error */
    .alert-error { background: rgba(239,68,68,.15); border: 1px solid var(--danger); color: var(--danger); border-radius: 10px; padding: 12px 16px; margin: 12px 16px; font-size: 13px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="statusbar">
    <span>{% now "H:i" %}</span>
    <span>Car Friend</span>
    <span>100%</span>
  </div>

  <div class="screen">
    {% block content %}{% endblock %}
  </div>

  {% block tabbar %}
  <nav class="tabbar">
    <a href="/visits" {% if active_tab == 'visits' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Visits
    </a>
    <a href="/" {% if active_tab == 'home' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      Home
    </a>
    <a href="/alerts" {% if active_tab == 'alerts' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      Alerts
    </a>
  </nav>
  {% endblock %}
</body>
</html>
