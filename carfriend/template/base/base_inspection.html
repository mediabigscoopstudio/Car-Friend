{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>{% block title %}Car Friend Inspector{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/carfriend-brand.css' %}">
  <link rel="stylesheet" href="{% static 'css/inspection.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <div class="statusbar">
    <span>{% now "H:i" %}</span>
    <span style="font-weight:700;color:#e8ecf4">Car Friend</span>
    <span>●●●</span>
  </div>

  <div class="screen {% block screen_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </div>

  {% block tabbar %}
  <nav class="tabbar">
    <a href="/" class="tab-logo">
      <div class="smile-icon">
        <svg viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
          <rect x="2" y="5" width="16" height="9" rx="3"/>
          <path d="M5 14 Q10 17.5 15 14"/>
        </svg>
      </div>
      <span class="brand-name">Car<span> Friend</span></span>
    </a>
    <a href="/visits" {% if active_tab == 'visits' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="label">Visits</span>
    </a>
    <a href="/" {% if active_tab == 'home' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="label">Home</span>
    </a>
    <a href="/alerts" {% if active_tab == 'alerts' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="label">Alerts</span>
    </a>
  </nav>
  {% endblock %}

</body>
</html>
