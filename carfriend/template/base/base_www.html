{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}Car Friend{% endblock %}</title>
  <link rel="icon" type="image/png" href="{% static 'img/brand/logo-green.png' %}">
  <link rel="apple-touch-icon" href="{% static 'img/brand/logo-green.png' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'www/carfriend-ui.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>
<script>document.documentElement.className += ' js';</script>
{% include "www/_icons.html" %}

<div class="cf-wrap">
  {% block nav %}{% endblock %}
  {% block body %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'www/carfriend-ui.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
